<script src="js/app.js"></script>
<script>
  // Generate the favicon by drawing the exact same "spa" glyph (Material Symbols
  // Outlined) used in the on-page logo onto a canvas, so the browser tab icon
  // is a pixel-perfect match instead of a hand-drawn approximation.
  (function () {
    function drawFavicon() {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Background circle — same primary-container green used behind the logo.
      ctx.fillStyle = '#006948';
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.fill();

      // The glyph itself, same font family/character as the TopAppBar icon.
      ctx.fillStyle = '#ffffff';
      ctx.font = "40px 'Material Symbols Outlined'";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('spa', size / 2, size / 2 + 2);

      document.getElementById('favicon-link').href = canvas.toDataURL('image/png');
    }

    if (document.fonts && document.fonts.load) {
      document.fonts.load("40px 'Material Symbols Outlined'").then(drawFavicon).catch(drawFavicon);
      // Fallback in case the font loads slightly after this resolves.
      document.fonts.ready.then(drawFavicon);
    } else {
      window.addEventListener('load', drawFavicon);
    }
  })();
</script>
</body>
</html>
